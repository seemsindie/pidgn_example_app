name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - name: Clone pidgn dependency
      run: git clone --depth 1 https://github.com/seemsindie/pidgn.git ../pidgn.zig
    - name: Clone pidgn_db dependency
      run: git clone --depth 1 https://github.com/seemsindie/pidgn_db.git ../pidgn_db
    - name: Clone pidgn_jobs dependency
      run: git clone --depth 1 https://github.com/seemsindie/pidgn_jobs.git ../pidgn_jobs
    - uses: mlugg/setup-zig@v2
      with:
        version: 0.16.0-dev.2905+5d71e3051
    - name: Install SQLite (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
    - name: Build
      run: zig build
